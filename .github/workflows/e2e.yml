name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          ACCEPT_EULA: 'Y'
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v4

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server on localhost:1433..."
          for i in {1..60}; do
            if nc -z localhost 1433; then
              echo "SQL Server is up" && break
            fi
            echo "still waiting..." && sleep 2
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client and run E2E script
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
        run: |
          # Ensure Prisma client is generated
          npx prisma generate
          chmod +x scripts/e2e.sh
          ./scripts/e2e.sh

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -nc --arg text "E2E workflow finished for $REPO: $STATUS - <$RUN_URL|details>" '{text: $text}')
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK" || true
          else
            echo "SLACK_WEBHOOK not set; skipping notification"
          fi
